{{- range $service := list "apiGateway" "supervisorAgent" "triageAgent" "ambientScribeAgent" "drugSafetyAgent" "cdssAgent" "diagnosticVisionAgent" "queueOptimizationAgent" "nurseTaskCoordination" "integrationService" }}
{{- $serviceConfig := index $.Values $service }}
{{- if $serviceConfig.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $service | kebabcase }}
  labels:
    app.kubernetes.io/name: {{ $service | kebabcase }}
    app.kubernetes.io/instance: {{ $.Release.Name }}
    app.kubernetes.io/version: {{ $serviceConfig.image.tag | quote }}
    app.kubernetes.io/component: {{ $service | kebabcase }}
    app.kubernetes.io/part-of: medhaos
    app.kubernetes.io/managed-by: {{ $.Release.Service }}
spec:
  {{- if not $serviceConfig.autoscaling.enabled }}
  replicas: {{ $serviceConfig.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $service | kebabcase }}
      app.kubernetes.io/instance: {{ $.Release.Name }}
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ $serviceConfig.service.port | quote }}
        prometheus.io/path: "/metrics"
      labels:
        app.kubernetes.io/name: {{ $service | kebabcase }}
        app.kubernetes.io/instance: {{ $.Release.Name }}
        app.kubernetes.io/version: {{ $serviceConfig.image.tag | quote }}
        app.kubernetes.io/component: {{ $service | kebabcase }}
    spec:
      {{- with $.Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ $.Values.serviceAccount.name }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: {{ $service | kebabcase }}
        image: "{{ $.Values.global.imageRegistry }}{{ $serviceConfig.image.repository }}:{{ $serviceConfig.image.tag }}"
        imagePullPolicy: {{ $serviceConfig.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ $serviceConfig.service.targetPort | default $serviceConfig.service.port }}
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          {{- toYaml $serviceConfig.resources | nindent 10 }}
        {{- if $serviceConfig.env }}
        env:
          {{- toYaml $serviceConfig.env | nindent 10 }}
        {{- end }}
        {{- if $serviceConfig.envFrom }}
        envFrom:
          {{- toYaml $serviceConfig.envFrom | nindent 10 }}
        {{- end }}
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: cache
          mountPath: /app/.cache
      {{- with $serviceConfig.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $serviceConfig.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $serviceConfig.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
      - name: tmp
        emptyDir: {}
      - name: cache
        emptyDir: {}
{{- end }}
{{- end }}
